# ============================================================
# CONEXION A BASE DE DATOS
# ============================================================
# Base de datos MySQL local. El esquema 'lista_intercambios' debe existir previamente.
# Parametros adicionales de la URL:
#   useSSL=false               -> desactiva SSL en entorno de desarrollo local
#   serverTimezone=UTC         -> evita errores de zona horaria al leer fechas
#   allowPublicKeyRetrieval=true -> requerido por el driver MySQL 8+ sin SSL
#
# MEJORA: Reemplazar las credenciales por variables de entorno para no
# exponer datos sensibles en el repositorio:
#   spring.datasource.username=${DB_USERNAME}
#   spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:mysql://localhost:3306/lista_intercambios?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=ProyectoSistemas2026!

# Driver JDBC de MySQL. Requerido explicitamente con Spring Boot 3+.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# CONFIGURACION JPA / HIBERNATE
# ============================================================
# 'update': Hibernate crea tablas inexistentes y agrega columnas nuevas
# sin borrar datos. Adecuado para desarrollo.
# MEJORA: Cambiar a 'validate' en produccion para que Hibernate solo
# verifique el esquema sin modificarlo, previniendo cambios accidentales.
spring.jpa.hibernate.ddl-auto=update

# Imprime las consultas SQL generadas por Hibernate en la consola.
# MEJORA: Desactivar en produccion (spring.jpa.show-sql=false)
# para evitar exponer la estructura de las queries en los logs.
spring.jpa.show-sql=true

# Formatea el SQL en varias lineas para facilitar su lectura durante el desarrollo.
spring.jpa.properties.hibernate.format_sql=true

# Dialecto que indica a Hibernate como generar SQL compatible con MySQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
