# ============================================================
# CONEXION A BASE DE DATOS
# ============================================================
# Parámetros adicionales de la URL:
#   useSSL=false               -> desactiva SSL en entorno de desarrollo local
#   serverTimezone=UTC         -> evita errores de zona horaria al leer fechas
#   allowPublicKeyRetrieval=true -> requerido por el driver MySQL 8+ sin SSL
#
# En producción, sobreescribir con la variable de entorno DB_URL.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/lista_intercambios?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}

# Credenciales de base de datos obtenidas desde variables de entorno.
# Si la variable no está definida, se usa el valor por defecto (sólo desarrollo local).
# En producción: export DB_USERNAME=<usuario> DB_PASSWORD=<clave>
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:ProyectoSistemas2026!}

# Driver JDBC de MySQL. Requerido explícitamente con Spring Boot 3+.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# CONFIGURACION JPA / HIBERNATE
# ============================================================
# 'update': crea tablas inexistentes y agrega columnas nuevas sin borrar datos.
# Adecuado para desarrollo. En producción usar 'validate' y gestionar el
# esquema con migraciones (Flyway o Liquibase).
spring.jpa.hibernate.ddl-auto=update

# Imprime las consultas SQL en consola. Desactivar en producción
# para no exponer la estructura de queries en los logs.
spring.jpa.show-sql=true

# Formatea el SQL en múltiples líneas para facilitar la lectura en desarrollo.
spring.jpa.properties.hibernate.format_sql=true

# Dialecto que indica a Hibernate cómo generar SQL compatible con MySQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# CORS
# ============================================================
# Origen permitido para peticiones cross-origin. En producción, establecer
# la variable de entorno CORS_ALLOWED_ORIGIN con la URL del frontend desplegado.
# Ejemplo: export CORS_ALLOWED_ORIGIN=https://mi-app.com
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:4200}
